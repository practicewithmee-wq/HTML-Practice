<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Block And Inline Elements</title>
</head>
<body>
 
<h1>Block Elements</h1>   
<p style="border: 1px solid red">Hello World</p>
<div style="border: 1px solid blue">Hello World</div>

<p>The P and the DIV elements are both block elements, and they will always start on a new line and take up the full width available (stretches out to the left and right as far as it can).</p>

<h1>Inline Elements</h1>
<span style="border: 1px solid red">Hello World</span>
<a href="#" style="border: 1px solid blue">Hello World</a>




</body>
</html>
